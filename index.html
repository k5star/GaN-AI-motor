
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GaN Motor AI Platform - V3.05 Dynamic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    <style>
        .value-glow { text-shadow: 0 0 8px rgba(34, 211, 238, 0.6); }
        canvas { cursor: crosshair; }
        .alarm-active { border-color: #ef4444 !important; background-color: rgba(127, 29, 29, 0.3) !important; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans leading-tight">

    <nav class="border-b border-slate-700 p-4 flex justify-between items-center bg-slate-900/90 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center font-bold text-white shadow-lg">G</div>
            <h1 class="text-xl font-semibold tracking-tight">GaN Motor <span class="text-cyan-400">AI Platform</span></h1>
        </div>
        <div class="flex gap-4">
            <input type="file" id="csvFileInput" accept=".csv" class="hidden">
            <label for="csvFileInput" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 px-4 py-2 rounded-lg text-sm font-bold cursor-pointer transition-all">📁 匯入日誌 (1.csv)</label>
        </div>
    </nav>

    <main class="p-6 max-w-[1600px] mx-auto grid grid-cols-12 gap-6">

        <div class="col-span-12 bg-slate-800/50 p-4 rounded-2xl border border-slate-700 flex flex-col md:flex-row items-center gap-6 shadow-xl">
            <div class="flex gap-2">
                <button id="playBtn" class="bg-cyan-600 p-2 rounded-full w-12 h-12 flex items-center justify-center hover:bg-cyan-500 transition shadow-lg">▶</button>
                <button id="resetBtn" class="bg-slate-700 p-2 rounded-full w-12 h-12 flex items-center justify-center hover:bg-slate-600 transition shadow-lg">⏹</button>
            </div>
            <div class="flex-1 w-full">
                <div class="flex justify-between text-[11px] text-slate-500 mb-1 font-mono">
                    <span id="currentTime">TIME: --:--:--</span>
                    <span id="currentFrame">FRAME: 0 / 0</span>
                </div>
                <input type="range" id="playbackRange" class="w-full h-1.5 bg-slate-900 rounded-lg appearance-none cursor-pointer accent-cyan-500" value="0">
            </div>
            <select id="playbackSpeed" class="bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-xs text-cyan-400 font-bold outline-none">
                <option value="200">0.5x</option>
                <option value="100" selected>1.0x</option>
                <option value="20">5.0x</option>
            </select>
        </div>

        <div class="col-span-12 lg:col-span-9 bg-slate-800 p-6 rounded-2xl border border-slate-700 h-[520px] shadow-xl relative">
            <div class="flex justify-between items-start mb-4">
                <div class="flex flex-col gap-2">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider">趨勢監測分析器</h2>
                    <div class="flex gap-3">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-cyan-500 font-bold mb-1">左軸 (Y1)</span>
                            <select id="selectY1" class="bg-slate-900 border border-cyan-500/50 rounded px-2 py-1 text-xs text-cyan-400 outline-none"></select>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] text-amber-500 font-bold mb-1">右軸 (Y2)</span>
                            <select id="selectY2" class="bg-slate-900 border border-amber-500/50 rounded px-2 py-1 text-xs text-amber-400 outline-none"></select>
                        </div>
                    </div>
                </div>
                <button onclick="resetZoom()" class="bg-cyan-900/30 hover:bg-cyan-900/50 text-cyan-400 text-[10px] font-bold px-3 py-1.5 rounded-lg border border-cyan-500/30 transition-all">🏠 重置縮放</button>
            </div>
            <div class="h-[380px]">
                <canvas id="liveChart"></canvas>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-3 bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
            <h2 class="mb-4 font-bold text-slate-400 text-sm">🔍 異常預警診斷</h2>
            <div id="alarmBox" class="p-6 h-[380px] bg-slate-900/50 rounded-xl border border-slate-700 flex flex-col items-center justify-center text-center transition-all">
                <div id="alarmIcon" class="text-5xl mb-4">✅</div>
                <p id="alarmStatus" class="text-lg font-bold">系統健康</p>
                <p id="alarmDetail" class="text-xs text-slate-500 mt-2 font-mono">Standby</p>
            </div>
        </div>

        <div id="cardContainer" class="col-span-12 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4"></div>
    </main>

    <script>
        const motorDataConfig = [
            { id: 'Data01', name: '馬達狀態', unit: '', scale: 1 },
            { id: 'Data02', name: '過載Flag', unit: '', scale: 1 },
            { id: 'Data03', name: '當前轉速', unit: 'RPM', scale: 1 },
            { id: 'Data04', name: '報警狀態', unit: '', scale: 1 },
            { id: 'Data05', name: '當前轉向', unit: '', scale: 1 },
            { id: 'Data06', name: '目標轉速', unit: 'RPM', scale: 1 },
            { id: 'Data07', name: '當前目標', unit: 'RPM', scale: 1 },
            { id: 'Data08', name: '輸出功率', unit: 'W', scale: 1 },
            { id: 'Data09', name: '實體 I/O', unit: 'bit', scale: 1 },
            { id: 'Data10', name: '驅動電壓', unit: 'V', scale: 0.01 },
            { id: 'Data11', name: '峰值電流', unit: 'A', scale: 0.01 },
            { id: 'Data12', name: '輸出Duty', unit: '%', scale: 0.1 },
            { id: 'Data13', name: '平均電流', unit: 'A', scale: 0.01 },
            { id: 'Data14', name: '扭矩限制', unit: 'A', scale: 0.01 },
            { id: 'Data15', name: '限制狀態', unit: '', scale: 1 },
            { id: 'Data16', name: '轉速等效V', unit: 'V', scale: 0.01 }
        ];

        let historyData = [];
        let currentIdx = 0;
        let playInterval = null;

        // 初始化圖表
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Y1', borderColor: '#22d3ee', data: [], yAxisID: 'y', pointRadius: 0, borderWidth: 2, tension: 0.2 },
                    { label: 'Y2', borderColor: '#fbbf24', data: [], yAxisID: 'y1', pointRadius: 0, borderWidth: 2, tension: 0.2 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                plugins: {
                    legend: { labels: { color: '#94a3b8', font: { size: 10 } } },
                    zoom: {
                        pan: { enabled: true, mode: 'xy', modifierKey: 'shift' },
                        zoom: { drag: { enabled: true, backgroundColor: 'rgba(34, 211, 238, 0.2)' }, mode: 'xy' }
                    }
                },
                scales: {
                    x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
                    y: { title: { display: true, color: '#22d3ee' }, grid: { color: '#1e293b' } },
                    y1: { position: 'right', title: { display: true, color: '#fbbf24' }, grid: { display: false } }
                }
            }
        });

        // 動態生成 UI 元素
        (function initUI() {
            const container = document.getElementById('cardContainer');
            const s1 = document.getElementById('selectY1');
            const s2 = document.getElementById('selectY2');

            motorDataConfig.forEach(item => {
                // 卡片
                container.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center shadow-md" id="card-${item.id}">
                        <p class="text-[9px] text-slate-500 font-mono font-bold">${item.id}</p>
                        <p class="text-[11px] text-slate-400 mb-2 truncate">${item.name}</p>
                        <p class="text-2xl font-bold text-white font-mono value-glow value">0.00</p>
                        <p class="text-[9px] text-slate-600 mt-1 uppercase">${item.unit}</p>
                    </div>`;

                // 下拉選單
                const opt = `<option value="${item.id}">${item.id} - ${item.name}</option>`;
                s1.innerHTML += opt;
                s2.innerHTML += opt;
            });

            s1.value = 'Data03'; // 預設 RPM
            s2.value = 'Data13'; // 預設電流

            // 監聽選擇器切換
            [s1, s2].forEach(select => {
                select.addEventListener('change', () => {
                    if (historyData.length > 0) reDrawChartToCurrent();
                });
            });
        })();

        // 將單行數據推入圖表
        function pushRowToChart(row) {
            const id1 = document.getElementById('selectY1').value;
            const id2 = document.getElementById('selectY2').value;
            const config1 = motorDataConfig.find(c => c.id === id1);
            const config2 = motorDataConfig.find(c => c.id === id2);

            const val1 = (parseFloat(row[motorDataConfig.findIndex(c => c.id === id1) + 1]) * config1.scale).toFixed(2);
            const val2 = (parseFloat(row[motorDataConfig.findIndex(c => c.id === id2) + 1]) * config2.scale).toFixed(2);

            liveChart.data.labels.push(row[0].split(' ')[2] || row[0]);
            liveChart.data.datasets[0].data.push(val1);
            liveChart.data.datasets[1].data.push(val2);

            // 更新圖例與座標軸標題
            liveChart.data.datasets[0].label = `${config1.name} (${config1.unit})`;
            liveChart.data.datasets[1].label = `${config2.name} (${config2.unit})`;
            liveChart.options.scales.y.title.text = config1.unit;
            liveChart.options.scales.y1.title.text = config2.unit;
        }

        function reDrawChartToCurrent() {
            liveChart.data.labels = [];
            liveChart.data.datasets.forEach(d => d.data = []);
            for(let i = 0; i <= currentIdx; i++) {
                pushRowToChart(historyData[i]);
            }
            liveChart.update('none');
        }

        function updateUIAtFrame(idx) {
            const row = historyData[idx];
            if (!row) return;

            document.getElementById('currentTime').innerText = `TIME: ${row[0].split(' ')[2] || row[0]}`;
            document.getElementById('currentFrame').innerText = `FRAME: ${idx + 1} / ${historyData.length}`;
            document.getElementById('playbackRange').value = idx;

            motorDataConfig.forEach((item, i) => {
                const rawVal = parseFloat(row[i + 1]) || 0;
                const card = document.getElementById(`card-${item.id}`);
                if (card) card.querySelector('.value').innerText = (rawVal * item.scale).toFixed(2);
            });

            pushRowToChart(row);
            liveChart.update('none');
            checkDiagnostic(row);
        }

        // CSV 讀取
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const lines = evt.target.result.trim().split('\n');
                historyData = lines.slice(1).map(line => line.split(',').map(v => v.trim()));
                document.getElementById('playbackRange').max = historyData.length - 1;
                resetChart();
                updateUIAtFrame(0);
            };
            reader.readAsText(e.target.files[0]);
        });

        function checkDiagnostic(row) {
            const fault = row[2]; // Data02
            const alarm = row[4]; // Data04
            const box = document.getElementById('alarmBox');
            if (fault !== "0" || alarm !== "0") {
                document.getElementById('alarmIcon').innerText = "🚨";
                document.getElementById('alarmStatus').innerText = "異常警報";
                document.getElementById('alarmDetail').innerText = `Flag: ${fault} | Alarm: ${alarm}`;
                box.classList.add('alarm-active');
            } else {
                document.getElementById('alarmIcon').innerText = "✅";
                document.getElementById('alarmStatus').innerText = "系統健康";
                document.getElementById('alarmDetail').innerText = "Normal Operation";
                box.classList.remove('alarm-active');
            }
        }

        function resetChart() {
            liveChart.data.labels = [];
            liveChart.data.datasets.forEach(d => d.data = []);
            liveChart.resetZoom();
            currentIdx = 0;
        }

        function resetZoom() { liveChart.resetZoom(); }

        // 播放控制
        document.getElementById('playBtn').addEventListener('click', function() {
            if (playInterval) {
                clearInterval(playInterval); playInterval = null;
                this.innerText = "▶";
            } else {
                this.innerText = "⏸";
                playInterval = setInterval(() => {
                    if (currentIdx < historyData.length - 1) {
                        currentIdx++; updateUIAtFrame(currentIdx);
                    } else {
                        clearInterval(playInterval); playInterval = null;
                        document.getElementById('playBtn').innerText = "▶";
                    }
                }, parseInt(document.getElementById('playbackSpeed').value));
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => { resetChart(); updateUIAtFrame(0); });

        document.getElementById('playbackRange').addEventListener('input', (e) => {
            currentIdx = parseInt(e.target.value);
            reDrawChartToCurrent();
        });
    </script>
</body>
</html>
