<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GaN Motor AI Platform - V4.0 Control & Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .value-glow { text-shadow: 0 0 8px rgba(34, 211, 238, 0.6); transition: color 0.2s; }
        .control-btn { transition: all 0.1s; active: scale-95; }
        .alarm-active { animation: pulse-red 2s infinite; border-color: #ef4444 !important; background: rgba(127,29,29,0.2); }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* 自定義滑桿樣式 */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #22d3ee; margin-top: -6px; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen flex flex-col overflow-hidden">

    <nav class="border-b border-slate-700 px-4 py-2 bg-slate-900/95 flex justify-between items-center z-50 shadow-md h-14 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-br from-cyan-600 to-blue-700 rounded-lg flex items-center justify-center font-bold text-white shadow">V4</div>
            <div>
                <h1 class="text-base font-bold tracking-tight text-slate-200">GaN Motor <span class="text-cyan-400">Control Center</span></h1>
                <p class="text-[10px] text-slate-500 font-mono -mt-1">ID:17 | 115200 8N1 | Modbus ASCII</p>
            </div>
        </div>

        <div class="flex gap-2 items-center">
            <div class="flex items-center bg-slate-800 rounded-lg p-1 border border-slate-700 mr-2">
                <button id="recBtn" onclick="toggleRecord()" class="px-3 py-1 rounded text-xs font-bold text-slate-400 hover:text-white flex items-center gap-1 transition-colors">
                    <span class="w-2 h-2 rounded-full bg-red-500 opacity-50" id="recDot"></span> REC
                </button>
                <div class="h-4 w-[1px] bg-slate-600 mx-1"></div>
                <span id="recCount" class="text-[10px] font-mono w-12 text-center text-slate-500">0</span>
                <button onclick="downloadCSV()" id="dlBtn" class="px-2 py-1 text-xs text-slate-500 hover:text-cyan-400 disabled:opacity-30" disabled>📥</button>
            </div>

            <button id="connectBtn" onclick="toggleConnect()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow transition flex items-center gap-2">
                🔌 連線
            </button>
        </div>
    </nav>

    <main class="flex-1 p-3 grid grid-cols-12 gap-3 overflow-hidden">

        <div class="col-span-12 lg:col-span-9 flex flex-col gap-3 h-full overflow-hidden">

            <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-lg relative flex flex-col h-[40%] shrink-0">
                <div class="absolute top-2 left-3 z-10 flex gap-2">
                    <select id="selectY1" class="bg-slate-900/80 border border-cyan-500/30 rounded px-1 py-0.5 text-[10px] text-cyan-400 outline-none"></select>
                    <select id="selectY2" class="bg-slate-900/80 border border-amber-500/30 rounded px-1 py-0.5 text-[10px] text-amber-400 outline-none"></select>
                </div>
                <div class="flex-1 w-full relative">
                    <canvas id="liveChart"></canvas>
                </div>
            </div>

            <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-lg p-4 flex-1 overflow-y-auto">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                        🎮 控制命令區 (Control Command)
                        <span id="cmdStatus" class="text-[10px] text-slate-500 font-normal">Ready</span>
                    </h2>
                    <div class="flex gap-2">
                        <button onclick="sendCmd(10, 1)" class="bg-amber-700/50 hover:bg-amber-600 text-amber-200 border border-amber-600/50 px-3 py-1 rounded text-xs font-bold transition">
                            ⚠️ 清除故障 (Reset)
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                    <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700 flex flex-col items-center justify-center gap-3">
                        <span class="text-[10px] text-slate-400 font-bold uppercase">主控開關 (Addr 9)</span>
                        <div class="flex gap-2 w-full">
                            <button onclick="sendCmd(9, 1)" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-lg font-bold shadow-lg active:translate-y-0.5 transition control-btn">
                                ▶ RUN (啟動)
                            </button>
                            <button onclick="sendCmd(9, 0)" class="flex-1 bg-red-600 hover:bg-red-500 text-white py-3 rounded-lg font-bold shadow-lg active:translate-y-0.5 transition control-btn">
                                ⏹ STOP (停止)
                            </button>
                        </div>

                        <div class="w-full h-[1px] bg-slate-700 my-1"></div>

                        <div class="w-full flex justify-between items-center px-1">
                            <span class="text-[10px] text-slate-400">控制模式 (Addr 11)</span>
                            <div class="flex bg-slate-800 rounded p-0.5 border border-slate-600">
                                <button onclick="sendCmd(11, 0)" id="modeSpeed" class="px-2 py-0.5 text-[10px] rounded bg-cyan-600 text-white transition">速度</button>
                                <button onclick="sendCmd(11, 1)" id="modeTorque" class="px-2 py-0.5 text-[10px] rounded text-slate-400 hover:text-white transition">扭矩</button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700 flex flex-col gap-2">
                        <div class="flex justify-between items-end">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">目標轉速 (Addr 19)</span>
                            <span id="targetRpmDisp" class="text-xl font-mono font-bold text-cyan-400">0 <span class="text-xs text-slate-500">RPM</span></span>
                        </div>
                        <input type="range" id="rpmSlider" min="-3000" max="3000" step="100" value="0" class="w-full accent-cyan-500" oninput="updateRpmDisplay(this.value)" onchange="sendCmd(19, this.value)">
                        <div class="flex justify-between text-[9px] text-slate-600 font-mono">
                            <span>-3000</span>
                            <span onclick="setRpm(0)" class="cursor-pointer hover:text-white">0 (Click to Stop)</span>
                            <span>3000</span>
                        </div>
                        <div class="grid grid-cols-4 gap-1 mt-1">
                            <button onclick="setRpm(500)" class="bg-slate-700 hover:bg-slate-600 text-[10px] py-1 rounded text-slate-300">500</button>
                            <button onclick="setRpm(1000)" class="bg-slate-700 hover:bg-slate-600 text-[10px] py-1 rounded text-slate-300">1000</button>
                            <button onclick="setRpm(2000)" class="bg-slate-700 hover:bg-slate-600 text-[10px] py-1 rounded text-slate-300">2000</button>
                            <button onclick="setRpm(3000)" class="bg-slate-700 hover:bg-slate-600 text-[10px] py-1 rounded text-slate-300">3000</button>
                        </div>
                    </div>

                    <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700 flex flex-col gap-3">
                        <span class="text-[10px] text-slate-400 font-bold uppercase">加減速參數 (0.1s)</span>

                        <div class="flex items-center gap-2">
                            <label class="text-[10px] w-12 text-slate-400">加速 (29)</label>
                            <input type="number" id="accVal" value="10" class="bg-slate-800 border border-slate-600 rounded w-16 px-1 text-xs text-center focus:border-cyan-500 outline-none text-white">
                            <button onclick="sendCmd(29, document.getElementById('accVal').value)" class="bg-slate-700 hover:bg-cyan-700 text-cyan-400 px-2 py-0.5 rounded text-[10px]">SET</button>
                        </div>

                        <div class="flex items-center gap-2">
                            <label class="text-[10px] w-12 text-slate-400">減速 (30)</label>
                            <input type="number" id="decVal" value="10" class="bg-slate-800 border border-slate-600 rounded w-16 px-1 text-xs text-center focus:border-cyan-500 outline-none text-white">
                            <button onclick="sendCmd(30, document.getElementById('decVal').value)" class="bg-slate-700 hover:bg-cyan-700 text-cyan-400 px-2 py-0.5 rounded text-[10px]">SET</button>
                        </div>

                        <div class="mt-auto text-[9px] text-slate-500 leading-tight">
                            * 參數寫入後立即生效<br>
                            * 數值 10 = 1.0 秒
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-3 flex flex-col gap-3 h-full overflow-hidden">

            <div class="bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-lg shrink-0" id="alarmBox">
                <div class="flex items-center gap-3">
                    <div id="alarmIcon" class="text-2xl grayscale transition-all">⚪</div>
                    <div class="overflow-hidden">
                        <p id="alarmStatus" class="text-sm font-bold text-slate-300">等待連線</p>
                        <p id="alarmDetail" class="text-[10px] text-slate-500 font-mono truncate">--</p>
                    </div>
                </div>
            </div>

            <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-lg flex-1 overflow-y-auto p-1" id="cardContainer">
                </div>

            <div class="bg-black/40 rounded-lg border border-slate-700 p-2 h-32 shrink-0 font-mono text-[9px] overflow-y-auto text-slate-400" id="logContent">
                <div class="opacity-50 text-center mt-4">System Log Ready</div>
            </div>
        </div>

    </main>

    <script>
        // === 配置與變數 ===
        const motorDataConfig = [
            { id: 'Data01', addr: 0x0000, name: '馬達狀態', unit: '', scale: 1 },
            { id: 'Data02', addr: 0x0001, name: '過載Flag', unit: '', scale: 1 },
            { id: 'Data03', addr: 0x0002, name: '當前轉速', unit: 'RPM', scale: 1 },
            { id: 'Data04', addr: 0x0003, name: '報警狀態', unit: '', scale: 1 },
            { id: 'Data05', addr: 0x0004, name: '當前轉向', unit: '', scale: 1 },
            { id: 'Data06', addr: 0x0005, name: '目標轉速', unit: 'RPM', scale: 1 },
            { id: 'Data07', addr: 0x0006, name: '當前目標', unit: 'RPM', scale: 1 },
            { id: 'Data08', addr: 0x0007, name: '輸出功率', unit: 'W', scale: 1 },
            { id: 'Data09', addr: 0x0008, name: '實體 I/O', unit: 'bit', scale: 1 },
            { id: 'Data10', addr: 0x0009, name: '驅動電壓', unit: 'V', scale: 0.01 },
            { id: 'Data11', addr: 0x000A, name: '輸出電流', unit: 'A', scale: 0.01 },
            { id: 'Data12', addr: 0x000B, name: '輸出Duty', unit: '%', scale: 0.1 },
            { id: 'Data13', addr: 0x000C, name: '平均電流', unit: 'A', scale: 0.01 },
            { id: 'Data14', addr: 0x000D, name: '扭矩限制', unit: 'A', scale: 0.01 },
            { id: 'Data15', addr: 0x000E, name: '限制狀態', unit: '', scale: 1 },
            { id: 'Data16', addr: 0x000F, name: '轉速電壓', unit: 'V', scale: 0.01 }
        ];

        let port, writer, reader;
        let isConnected = false;
        let keepReading = false;
        let pollTimer = null;
        let asciiBuffer = "";
        let currentValues = new Array(16).fill(0);

        // 紀錄相關
        let isRecording = false;
        let logData = []; // [{time, data01, ... data16}]
        let startTime = 0;

        // === 初始化圖表 ===
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(50).fill(''),
                datasets: [
                    { label: 'Y1', borderColor: '#22d3ee', data: Array(50).fill(null), yAxisID: 'y', pointRadius: 0, borderWidth: 1.5, tension: 0.2 },
                    { label: 'Y2', borderColor: '#fbbf24', data: Array(50).fill(null), yAxisID: 'y1', pointRadius: 0, borderWidth: 1.5, tension: 0.2 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { position: 'left', grid: { color: '#1e293b' }, ticks: { color: '#22d3ee', font: {size:9} }, border: {display: false} },
                    y1: { position: 'right', grid: { display: false }, ticks: { color: '#fbbf24', font: {size:9} }, border: {display: false} }
                }
            }
        });

        // === 初始化 UI ===
        (function initUI() {
            const container = document.getElementById('cardContainer');
            const s1 = document.getElementById('selectY1');
            const s2 = document.getElementById('selectY2');

            motorDataConfig.forEach((item, index) => {
                // 生成右側數據條
                container.innerHTML += `
                    <div class="flex justify-between items-center p-2 border-b border-slate-700/50 hover:bg-slate-700/30 transition text-[10px]" id="card-${index}">
                        <div class="flex flex-col">
                            <span class="text-slate-500 font-mono">${item.id}</span>
                            <span class="text-slate-300 font-bold">${item.name}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-base font-mono font-bold text-white value value-glow">0.00</span>
                            <span class="text-slate-500 text-[9px]">${item.unit}</span>
                        </div>
                    </div>`;

                // 下拉選單
                const opt = `<option value="${index}">${item.name}</option>`;
                s1.innerHTML += opt;
                s2.innerHTML += opt;
            });

            s1.value = 2; // RPM
            s2.value = 10; // Current

            [s1, s2].forEach(s => s.addEventListener('change', () => {
                liveChart.data.datasets[0].label = motorDataConfig[s1.value].name;
                liveChart.data.datasets[1].label = motorDataConfig[s2.value].name;
            }));
        })();

        // === 通訊核心 (Modbus ASCII) ===

        async function toggleConnect() {
            if (isConnected) { window.location.reload(); return; } // 簡單斷線處理

            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 }); // 8N1 default
                await port.setSignals({ dataTerminalReady: true, requestToSend: true });

                isConnected = true;
                keepReading = true;

                const btn = document.getElementById('connectBtn');
                btn.innerHTML = "🔴 斷線";
                btn.classList.replace('bg-blue-600', 'bg-red-600');

                log("SYS", "Connected to COM Port", "text-green-400");
                readLoop();

                // 10Hz 輪詢讀取 (ID=17, Read 0~15)
                pollTimer = setInterval(() => {
                    sendRawAscii(":110300000010DC\r\n"); // 固定指令最高效
                }, 100);

            } catch (e) {
                alert(e.message);
            }
        }

        // 寫入暫存器 (FC=06)
        // Cmd: :11 06 [AddrHi] [AddrLo] [ValHi] [ValLo] [LRC] \r\n
        async function sendCmd(addr, val) {
            if (!isConnected) return alert("請先連線");

            // 轉 Hex 字串
            const idHex = "11";
            const fcHex = "06";
            const addrHex = addr.toString(16).toUpperCase().padStart(4, '0');

            // 處理負數值 (Signed 16-bit)
            let v = parseInt(val);
            if (v < 0) v = 0xFFFF + v + 1;
            const valHex = v.toString(16).toUpperCase().padStart(4, '0');

            // 計算 LRC
            // 原始 Bytes: 11, 06, AddrHi, AddrLo, ValHi, ValLo
            const bytes = [
                0x11, 0x06,
                (addr >> 8) & 0xFF, addr & 0xFF,
                (v >> 8) & 0xFF, v & 0xFF
            ];

            let sum = 0;
            bytes.forEach(b => sum += b);
            const lrc = ((~sum) + 1) & 0xFF;
            const lrcHex = lrc.toString(16).toUpperCase().padStart(2, '0');

            const cmdStr = `:${idHex}${fcHex}${addrHex}${valHex}${lrcHex}\r\n`;

            // 暫停一下輪詢以免衝突 (簡單防撞)
            clearInterval(pollTimer);
            await sendRawAscii(cmdStr);
            log("CMD", `Write Addr:${addr} Val:${val}`, "text-yellow-400");

            // 恢復輪詢
            setTimeout(() => {
                pollTimer = setInterval(() => { sendRawAscii(":110300000010DC\r\n"); }, 100);
            }, 150);

            // UI Feedback
            const status = document.getElementById('cmdStatus');
            status.innerText = `Sent: Addr ${addr} = ${val}`;
            status.classList.add('text-yellow-400');
            setTimeout(()=>status.classList.remove('text-yellow-400'), 1000);

            // 如果是切換模式，更新按鈕樣式
            if(addr === 11) {
                document.getElementById('modeSpeed').className = val==0 ? "px-2 py-0.5 text-[10px] rounded bg-cyan-600 text-white transition" : "px-2 py-0.5 text-[10px] rounded text-slate-400 hover:text-white transition";
                document.getElementById('modeTorque').className = val==1 ? "px-2 py-0.5 text-[10px] rounded bg-amber-600 text-white transition" : "px-2 py-0.5 text-[10px] rounded text-slate-400 hover:text-white transition";
            }
        }

        async function sendRawAscii(str) {
            if(!port || !port.writable) return;
            const encoder = new TextEncoder();
            const writer = port.writable.getWriter();
            await writer.write(encoder.encode(str));
            writer.releaseLock();
        }

        async function readLoop() {
            const decoder = new TextDecoder();
            while (port && port.readable && keepReading) {
                try {
                    reader = port.readable.getReader();
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        if (value) {
                            asciiBuffer += decoder.decode(value);
                            processBuffer();
                        }
                    }
                } catch (e) { console.error(e); }
                finally { reader.releaseLock(); }
            }
        }

        function processBuffer() {
            let start = asciiBuffer.indexOf(':');
            let end = asciiBuffer.indexOf('\r\n');
            while (start !== -1 && end !== -1) {
                if (end > start) {
                    const pkt = asciiBuffer.substring(start, end);
                    parsePacket(pkt);
                    asciiBuffer = asciiBuffer.substring(end + 2);
                } else {
                    asciiBuffer = asciiBuffer.substring(start); // 丟棄損壞的前綴
                }
                start = asciiBuffer.indexOf(':');
                end = asciiBuffer.indexOf('\r\n');
            }
        }

        function parsePacket(pkt) {
            // 只處理讀取回應 (FC=03, Len=64 chars data)
            // :1103 20 [DATA...] LRC
            if (pkt.length < 70 || pkt.substr(3, 2) !== '03') return;

            const dataHex = pkt.substr(7, 64);
            const now = new Date();
            const timeStr = now.toLocaleTimeString();

            // 解析數據
            let rowObj = { time: timeStr, timestamp: now.getTime() };

            for(let i=0; i<16; i++) {
                let val = parseInt(dataHex.substr(i*4, 4), 16);
                if(val > 32767) val -= 65536; // Signed
                currentValues[i] = val;
                rowObj[`d${i}`] = (val * motorDataConfig[i].scale).toFixed(2);
            }

            // 更新 UI
            updateDashboard();

            // 紀錄
            if(isRecording) {
                logData.push(rowObj);
                document.getElementById('recCount').innerText = logData.length;
            }
        }

        function updateDashboard() {
            // 1. 右側數據列表
            currentValues.forEach((raw, idx) => {
                const cfg = motorDataConfig[idx];
                const valStr = (raw * cfg.scale).toFixed(cfg.scale < 1 ? 2 : 0);
                const el = document.querySelector(`#card-${idx} .value`);
                if(el) {
                    if(el.innerText !== valStr) el.style.color = '#22d3ee'; // Blink
                    el.innerText = valStr;
                    setTimeout(()=>el.style.color='white', 200);
                }
            });

            // 2. 圖表
            const idx1 = document.getElementById('selectY1').value;
            const idx2 = document.getElementById('selectY2').value;
            const v1 = currentValues[idx1] * motorDataConfig[idx1].scale;
            const v2 = currentValues[idx2] * motorDataConfig[idx2].scale;

            liveChart.data.datasets[0].data.push(v1);
            liveChart.data.datasets[0].data.shift();
            liveChart.data.datasets[1].data.push(v2);
            liveChart.data.datasets[1].data.shift();
            liveChart.update('none');

            // 3. 診斷 (Alarm)
            const alm = currentValues[3];
            const box = document.getElementById('alarmBox');
            const icon = document.getElementById('alarmIcon');
            const status = document.getElementById('alarmStatus');

            if (alm !== 0) {
                box.classList.add('alarm-active');
                icon.innerText = "🚨";
                icon.classList.remove('grayscale');
                status.innerText = "ALARM ACTIVE";
                status.classList.add('text-red-500');
                document.getElementById('alarmDetail').innerText = `Code: ${alm}`;
            } else {
                box.classList.remove('alarm-active');
                icon.innerText = "✅";
                icon.classList.add('grayscale');
                status.innerText = "System Normal";
                status.classList.remove('text-red-500');
                document.getElementById('alarmDetail').innerText = "No Faults";
            }
        }

        // === 紀錄功能 ===
        function toggleRecord() {
            isRecording = !isRecording;
            const btn = document.getElementById('recBtn');
            const dot = document.getElementById('recDot');
            const dl = document.getElementById('dlBtn');

            if(isRecording) {
                logData = [];
                dot.classList.remove('opacity-50');
                dot.classList.add('animate-ping');
                btn.classList.add('text-white');
                dl.disabled = true;
                log("SYS", "Recording Started", "text-cyan-400");
            } else {
                dot.classList.add('opacity-50');
                dot.classList.remove('animate-ping');
                btn.classList.remove('text-white');
                dl.disabled = false;
                log("SYS", `Recording Stopped (${logData.length} rows)`, "text-yellow-400");
            }
        }

        function downloadCSV() {
            if(logData.length === 0) return;

            let csv = "Timestamp,Time";
            motorDataConfig.forEach(c => csv += `,${c.name}(${c.unit})`);
            csv += "\n";

            logData.forEach(row => {
                csv += `${row.timestamp},${row.time}`;
                for(let i=0; i<16; i++) csv += `,${row['d'+i]}`;
                csv += "\n";
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `MotorLog_${Date.now()}.csv`;
            link.click();
        }

        // === Helpers ===
        function updateRpmDisplay(val) {
            document.getElementById('targetRpmDisp').innerHTML = `${val} <span class="text-xs text-slate-500">RPM</span>`;
        }
        function setRpm(val) {
            document.getElementById('rpmSlider').value = val;
            updateRpmDisplay(val);
            sendCmd(19, val);
        }
        function log(type, msg, cls) {
            const box = document.getElementById('logContent');
            box.innerHTML += `<div><span class="${cls} font-bold">[${type}]</span> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

    </script>
</body>
</html>
